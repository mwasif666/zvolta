# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name zvolta.com www.zvolta.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zvolta.com www.zvolta.com;

    # Document root
    root /home/zvolta-website;
    index index.html index.htm;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/zvolta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zvolta.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/zvolta.com/chain.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/zvolta.com.access.log;
    error_log /var/log/nginx/zvolta.com.error.log;

    # Route /mobile to mobile.html
    location = /mobile {
        try_files $uri $uri/ /mobile.html;
    }

    # Main location
    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /home/zvolta-website;
    }
}
